name: ci
on:
  push:
    branches: [main]
  pull_request:
jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: service-directory-cli
      - uses: actions/checkout@v5
        with:
          repository: zfdang/service-directory-backend
          path: service-directory-backend
          token: ${{ secrets.SERVICE_DIRECTORY_BACKEND_READ_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: fmt
        working-directory: service-directory-cli
        run: cargo fmt --all -- --check
      - name: clippy
        working-directory: service-directory-cli
        run: cargo clippy --all-targets -- -D warnings
      - name: test
        working-directory: service-directory-cli
        run: cargo test --all
